<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Electronic shop items</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body {
            background-color: #f8f9fa;
        }
        .page-title {
            text-align: center;
            font-weight: 700;
            margin: 2rem 0 2.5rem;
            color: #000;
        }
        .item-card {
            background-color: #d1e7dd;
            border: none;
            border-radius: 0.75rem;
            text-align: center;
            height: 100%;
        }
        .item-name {
            color: #0d6efd;
            font-weight: 700;
        }
        .item-desc {
            color: #000;
            font-size: 0.95rem;
        }
        .item-price {
            color: #198754;
            font-weight: 700;
        }
        .btn-details {
            background-color: #198754;
            border-color: #198754;
            color: #fff;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .btn-details:hover {
            background-color: #157347;
            border-color: #146c43;
            color: #fff;
        }
    </style>
</head>
<body>
<div class="container py-4">
    <h1 class="page-title">Electronic shop items</h1>
    <div class="row g-4">
        <div class="col-md-4" th:each="item : ${items}">
            <div class="card item-card shadow-sm">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title item-name" th:text="${item.name}">Name</h5>
                    <p class="card-text item-desc flex-grow-1" th:text="${item.description}">Description</p>
                    <p class="item-price mb-3">
                        <span th:text="${#numbers.formatDecimal(item.price, 1, 2)}">0.00</span>
                        <span> $</span>
                    </p>
                    <button type="button" class="btn btn-details w-100 text-uppercase">DETAILS</button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
